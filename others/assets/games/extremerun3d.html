<!doctype html>
<html lang="en-us">
  <head>
<script src="/dist/others/assets/scripts/game-save-bridge.js"></script>
  <script src="/dist/others/assets/scripts/game-save-bridge.js"></script>
<script>window.__RELIC_GAME_ID__="extremerun3d";</script>
    <base href="https://cdn.jsdelivr.net/gh/faralong/all@main/extremerun/" />

    <meta charset="utf-8" />
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, user-scalable=no"
    />
    <title>Extreme Run 3D</title>
    <link rel="shortcut icon" href="TemplateData/favicon.ico" />
    <link rel="stylesheet" href="TemplateData/style.css" />

    <style>
      @import url('https://fonts.googleapis.com/css2?family=Heebo:wght@200;500&display=swap');
      @import url('https://fonts.googleapis.com/css2?family=Heebo:wght@200;500&family=MuseoModerno:wght@600&display=swap');
    </style>
  </head>
  <body class="dark">
    <div id="unity-container" class="unity-desktop">
      <canvas id="unity-canvas"></canvas>
    </div>
    <div id="loading-cover" style="display: none">
      <div id="unity-loading-bar">
        <div id="unity-logo">
          <img src="logo.png" />
          <br />
          <p
            id="loading-txt"
            style="
              text-align: center;
              font-family: 'MuseoModerno', cursive;
              color: white;
              font-size: 50px;
              margin-top: 0px;
              margin-bottom: 0px;
            "
          >
            Loading...
          </p>
        </div>

        <div id="unity-progress-bar-empty" style="display: none">
          <div id="unity-progress-bar-full"></div>
        </div>
        <div class="spinner"></div>
      </div>
    </div>
    <div id="unity-fullscreen-button" style="display: none"></div>
    <script>
      const hideFullScreenButton = '';
      const buildUrl = 'Build';
      const loaderUrl = buildUrl + '/ExtremeRun3D_13May.loaderrrr.js';
      const config = {
        dataUrl: buildUrl + '/fc4125c5f6edc94f1926057556d3cd21.data.unityweb',
        frameworkUrl:
          buildUrl + '/e95a19b5525f8ed2c2acf8820ae45cc1.js.unityweb',
        codeUrl: buildUrl + '/bec53a90c17b21b72af689a95d70004b.wasm.unityweb',
        streamingAssetsUrl: 'StreamingAssets',
        companyName: 'GAMEHOX11',
        productName: 'Extreme Run 3D',
        productVersion: '1.8',
      };

      const container = document.querySelector('#unity-container');
      const canvas = document.querySelector('#unity-canvas');
      const loadingCover = document.querySelector('#loading-cover');
      const progressBarEmpty = document.querySelector(
        '#unity-progress-bar-empty'
      );
      const progressBarFull = document.querySelector(
        '#unity-progress-bar-full'
      );
      const fullscreenButton = document.querySelector(
        '#unity-fullscreen-button'
      );
      const spinner = document.querySelector('.spinner');

      const canFullscreen = (function () {
        for (const key of [
          'exitFullscreen',
          'webkitExitFullscreen',
          'webkitCancelFullScreen',
          'mozCancelFullScreen',
          'msExitFullscreen',
        ]) {
          if (key in document) {
            return true;
          }
        }
        return false;
      })();

      if (/iPhone|iPad|iPod|Android/i.test(navigator.userAgent)) {
        container.className = 'unity-mobile';
        config.devicePixelRatio = 1;
      }
      loadingCover.style.display = '';

      const script = document.createElement('script');
      script.src = loaderUrl;
      script.onload = () => {
        createUnityInstance(canvas, config, (progress) => {
          spinner.style.display = 'none';
          progressBarEmpty.style.display = '';
          progressBarFull.style.width = `${100 * progress}%`;
        })
          .then((unityInstance) => {
            loadingCover.style.display = 'none';
            if (canFullscreen) {
              if (!hideFullScreenButton) {
                fullscreenButton.style.display = '';
              }
              fullscreenButton.onclick = () => {
                unityInstance.SetFullscreen(1);
              };
            }
          })
          .catch((message) => {
            alert(message);
          });
      };
      document.body.appendChild(script);
    </script>
  </body>
</html>
