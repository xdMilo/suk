<!doctype html>
<html lang="en-us">
  <head>
<script src="/dist/others/assets/scripts/game-save-bridge.js"></script>
  <script src="/dist/others/assets/scripts/game-save-bridge.js"></script>
<script>window.__RELIC_GAME_ID__="cuphead";</script>
    <base href="https://cdn.jsdelivr.net/gh/web-ports/cuphead@main/" />
    <meta charset="utf-8" />
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8" />
    <title>Unity WebGL Player | Cuphead</title>
    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        height: 100%;
        overflow: hidden;
        background: #231f20;
      }

      #unity-canvas {
        position: fixed;
        inset: 0;
        width: 100%;
        height: 100%;
        display: none;
        background: #231f20;
      }
    </style>
  </head>

  <body>
    <div
      id="loading-text"
      style="
        color: white;
        font-size: 48px;
        font-family: cursive;
        text-align: center;
        margin-top: 20px;
      "
    >
      LOADING...
    </div>
    <div id="unityContainer"></div>
    <script src="Build/UnityLoader.js"></script>
    <script>
      const loadingText = document.querySelector('#loading-text');

      let totalBytes = 0;
      let loadedBytes = 0;

      async function getSize(url) {
        try {
          const res = await fetch(url, { method: 'HEAD' });
          return parseInt(res.headers.get('Content-Length') || '0', 10);
        } catch {
          return 0;
        }
      }

      async function fetchWithProgress(url) {
        const response = await fetch(url);
        const reader = response.body.getReader();
        const chunks = [];
        let received = 0;

        while (true) {
          const { done, value } = await reader.read();
          if (done) break;
          received += value.length;
          loadedBytes += value.length;
          chunks.push(value);

          let mbDone = (loadedBytes / (1024 * 1024)).toFixed(2);
          let mbTotal = (totalBytes / (1024 * 1024)).toFixed(2);
          loadingText.textContent = `LOADING... ${mbDone} MB / ${mbTotal} MB`;
        }

        const fullBuffer = new Uint8Array(received);
        let offset = 0;
        for (const chunk of chunks) {
          fullBuffer.set(chunk, offset);
          offset += chunk.length;
        }
        return fullBuffer.buffer;
      }

      async function mergeFiles(parts, workerCount = 4) {
        const buffers = new Array(parts.length);
        let index = 0;

        async function worker() {
          while (index < parts.length) {
            const i = index++;
            buffers[i] = await fetchWithProgress(parts[i]);
          }
        }

        await Promise.all(
          Array.from({ length: Math.min(workerCount, parts.length) }, worker)
        );

        const blob = new Blob(buffers);
        return URL.createObjectURL(blob);
      }

      function getParts(file, start, end) {
        const parts = [];
        for (let i = start; i <= end; i++) {
          parts.push(file + '.part' + i);
        }
        return parts;
      }

      function resizeUnityContainer() {
        const container = document.getElementById('unityContainer');
        container.style.width = window.innerWidth + 'px';
        container.style.height = window.innerHeight + 'px';
      }

      (async () => {
        const allParts = [
          ...getParts('Build/Build.asm.code.unityweb', 1, 3),
          ...getParts('Build/Build.data.unityweb', 1, 102),
          ...getParts('Build/Build.wasm.code.unityweb', 1, 2),
        ];

        const sizes = await Promise.all(allParts.map(getSize));
        totalBytes = sizes.reduce((a, b) => a + b, 0);

        const [asmurl, dataUrl, wasmurl] = await Promise.all([
          mergeFiles(getParts('Build/Build.asm.code.unityweb', 1, 3)),
          mergeFiles(getParts('Build/Build.data.unityweb', 1, 102)),
          mergeFiles(getParts('Build/Build.wasm.code.unityweb', 1, 2)),
        ]);

        const json = {
          companyName: 'SpanishFreddy',
          productName: 'Cuphead',
          dataUrl: dataUrl,
          wasmCodeUrl: wasmurl,
          wasmFrameworkUrl: 'Build.wasm.framework.unityweb',
          asmCodeUrl: asmurl,
          asmMemoryUrl: 'Build.asm.memory.unityweb',
          asmFrameworkUrl: 'Build.asm.framework.unityweb',
          TOTAL_MEMORY: 268435456,
          graphicsAPI: ['WebGL 2.0'],
          webglContextAttributes: { preserveDrawingBuffer: false },
          splashScreenStyle: 'Dark',
          backgroundColor: '#231F20',
        };

        const blob = new Blob([JSON.stringify(json)], {
          type: 'application/json',
        });
        const blobUrl = URL.createObjectURL(blob);

        window.addEventListener('resize', resizeUnityContainer);

        UnityLoader.instantiate('unityContainer', json, {
          url: blobUrl,
          Module: {
            onRuntimeInitialized: function () {
              resizeUnityContainer();
              document.querySelector('#loading-text').remove();
            },
          },
        });

        function resizeCanvas() {
          const container = document.getElementById('unityContainer');
          container.style.width = window.innerWidth + 'px';
          container.style.height = window.innerHeight + 'px';
          setTimeout(resizeCanvas, 1000);
        }
        resizeCanvas();
      })();
    </script>
  </body>
</html>
